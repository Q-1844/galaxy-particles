<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐 - 3D粒子场景</title>
    <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&family=Noto+Serif+SC:wght@300;400;500&family=Ma+Shan+Zheng&family=Long+Cang&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "./three.module.js",
                "three/examples/jsm/OrbitControls.js": "./OrbitControls.js",
                "three/examples/jsm/OBJLoader.js": "./OBJLoader.js",
                "three/examples/jsm/EffectComposer.js": "./EffectComposer.js",
                "three/examples/jsm/RenderPass.js": "./RenderPass.js",
                "three/examples/jsm/UnrealBloomPass.js": "./UnrealBloomPass.js",
                "three/examples/jsm/ShaderPass.js": "./ShaderPass.js",
                "three/examples/jsm/Pass.js": "./Pass.js",
                "three/examples/jsm/shaders/CopyShader.js": "./CopyShader.js",
                "three/examples/jsm/shaders/LuminosityHighPassShader.js": "./LuminosityHighPassShader.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        
        #sceneContainer {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-align: center;
            z-index: 1000;
        }
        
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #musicControl {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        #musicControl:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        #musicControl svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        
        #musicControl.playing {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-spinner"></div>
        <div>加载中...</div>
    </div>
    <div id="sceneContainer"></div>
    
    <!-- 音乐播放器 -->
    <audio id="bgMusic" loop>
        <source src="./music/background-music.mp3" type="audio/mpeg">
    </audio>
    
    <button id="musicControl" title="播放/暂停音乐">
        <svg id="playIcon" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display: none;">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
    </button>
    
    <!-- JSZip 库（全局变量） -->
    <script src="./yasuojszip.min.js"></script>
    
    <script type="module">
        import { startBirthdayScene } from './love.js';
        
        // 音乐控制
        const bgMusic = document.getElementById('bgMusic');
        const musicControl = document.getElementById('musicControl');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        let isPlaying = false;
        
        // 设置音乐音量
        bgMusic.volume = 0.5;
        
        // 音乐控制按钮点击事件
        musicControl.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                musicControl.classList.remove('playing');
            } else {
                bgMusic.play().catch(e => {
                    console.log('音乐播放失败:', e);
                });
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                musicControl.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });
        
        // 自动播放音乐（需要用户交互后）
        function tryAutoPlay() {
            bgMusic.play().then(() => {
                isPlaying = true;
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                musicControl.classList.add('playing');
            }).catch(e => {
                console.log('自动播放失败，需要用户交互:', e);
            });
        }
        
        // 等待字体加载完成后再启动场景
        async function loadFonts() {
            try {
                await document.fonts.load('140px Ma Shan Zheng');
                await document.fonts.load('140px Tangerine');
                console.log('字体加载完成');
            } catch (e) {
                console.log('字体加载失败，使用默认字体', e);
            }
            
            const loading = document.getElementById('loading');
            if (loading) {
                loading.style.display = 'none';
            }
            
            // 启动生日场景
            startBirthdayScene();
            
            // 尝试自动播放音乐
            setTimeout(tryAutoPlay, 1000);
        }
        
        loadFonts();
    </script>
</body>
</html>
